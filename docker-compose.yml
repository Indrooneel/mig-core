services:
  mig:
    build: .
    container_name: mig-core
    ports:
      - "8000:8000"
    volumes:
      - ./policies:/app/policies
      - mig-data:/app/data
    environment:
      - MIG_POLICY_DIR=/app/policies
      - MIG_AUDIT_DB=/app/data/audit.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mig-data:
